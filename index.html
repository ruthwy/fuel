<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Fuel — Food Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#0d1117; --card:#161b22; --card2:#1c2330; --border:#2d333b;
  --text:#e6edf3; --dim:#8b949e; --accent:#4f8ef7;
  --good:#34d399; --ok:#fbbf24; --bad:#f87171;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:15px; overscroll-behavior-y:none}
body{padding-bottom:calc(64px + env(safe-area-inset-bottom))}
h1,h2,h3{margin:0}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;background:var(--card2);
  color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
label{display:block;font-size:12px;color:var(--dim);margin:12px 0 4px}

.page{display:none;padding:14px 14px 20px;max-width:560px;margin:0 auto}
.page.active{display:block}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:calc(10px + env(safe-area-inset-top)) 2px 12px}
.topbar h1{font-size:20px;font-weight:700}
.topbar .date-nav{display:flex;gap:6px;align-items:center;color:var(--dim);font-size:13px}
.topbar .date-nav button{font-size:18px;padding:4px 10px;color:var(--accent)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:12px}

/* progress bars */
.stat-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.stat-row b{font-size:13px}
.bar{height:8px;background:var(--card2);border-radius:5px;overflow:hidden;margin-bottom:12px}
.bar > div{height:100%;border-radius:5px;transition:width .3s}
.bar .g{background:var(--good)} .bar .o{background:var(--ok)} .bar .b{background:var(--bad)}

/* meal slots */
.slot{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:10px;overflow:hidden}
.slot-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.slot-head .check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.slot-head .check.done{background:var(--good);border-color:var(--good);color:#06281c}
.slot-head .check.skip{background:var(--card2);color:var(--dim)}
.slot-head .s-name{font-weight:600;flex:1}
.slot-head .s-kcal{font-size:12px;color:var(--dim)}
.slot-body{padding:0 14px 12px;border-top:1px solid var(--border);display:none}
.slot.open .slot-body{display:block}
.slot-item{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:14px;
  border-bottom:1px dashed var(--border)}
.slot-item:last-of-type{border-bottom:none}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--good)} .dot.o{background:var(--ok)} .dot.b{background:var(--bad)}
.slot-item .i-name{flex:1}
.slot-item .i-macro{color:var(--dim);font-size:12px;text-align:right}
.slot-item .del{color:var(--bad);font-size:16px;padding:2px 6px}
.slot-actions{display:flex;gap:8px;margin-top:10px}
.btn{background:var(--card2);border:1px solid var(--border);border-radius:10px;
  padding:9px 14px;font-size:13px;font-weight:600;color:var(--text)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.good{background:var(--good);border-color:var(--good);color:#06281c}
.btn.warn{color:var(--bad)}
.btn.small{padding:6px 10px;font-size:12px}
.btn:active{opacity:.7}
.btn.full{width:100%;padding:12px;font-size:15px}

/* water */
.water-glasses{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.glass{width:34px;height:44px;border:2px solid var(--border);border-radius:6px 6px 10px 10px;
  display:flex;align-items:flex-end;justify-content:center;font-size:10px;color:var(--dim);
  position:relative;overflow:hidden}
.glass.full{border-color:#38bdf8}
.glass.full::after{content:'';position:absolute;inset:4px 3px 3px;background:#38bdf880;border-radius:3px}
.glass.bonus{border-style:dashed}

/* modal */
.modal-bg{position:fixed;inset:0;background:#000a;display:none;z-index:50;
  align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:560px;
  max-height:85vh;overflow-y:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
.modal h3{margin-bottom:10px}
.food-list{max-height:38vh;overflow-y:auto;margin:10px 0}
.food-row{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:1px solid var(--border);cursor:pointer}
.food-row:active{background:var(--card2)}
.food-row .f-name{flex:1}
.food-row .f-info{font-size:11px;color:var(--dim);text-align:right}
.basis-tag{font-size:10px;padding:2px 6px;border-radius:6px;background:var(--card2);color:var(--dim)}

/* bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);
  border-top:1px solid var(--border);display:flex;z-index:40;
  padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;
  gap:2px;font-size:10px;color:var(--dim)}
.nav button.active{color:var(--accent)}
.nav .ico{font-size:20px;line-height:1}

/* chat */
#chatlog{display:flex;flex-direction:column;gap:10px;min-height:40vh;max-height:60vh;
  overflow-y:auto;padding:4px 0;margin-bottom:10px}
.msg{padding:10px 13px;border-radius:14px;max-width:85%;font-size:14px;line-height:1.45;white-space:pre-wrap}
.msg.me{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.ai{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.chat-input{display:flex;gap:8px}
.chat-input textarea{flex:1;resize:none;height:44px}

/* charts */
canvas{width:100%;background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.legend{display:flex;gap:14px;font-size:11px;color:var(--dim);margin:6px 2px 14px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px}

.pill-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px}
.pill{padding:7px 13px;border-radius:20px;background:var(--card2);border:1px solid var(--border);
  font-size:13px;white-space:nowrap;color:var(--dim)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.muted{color:var(--dim);font-size:12px;line-height:1.5}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.big-num{font-size:26px;font-weight:700}
.toast{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  background:var(--card2);border:1px solid var(--border);padding:10px 18px;border-radius:12px;
  font-size:13px;z-index:99;display:none}
hr{border:none;border-top:1px solid var(--border);margin:14px 0}
</style>
</head>
<body>

<!-- ============ TODAY ============ -->
<div class="page active" id="page-today">
  <div class="topbar">
    <h1 id="today-title">Today</h1>
    <div class="date-nav">
      <button onclick="shiftDay(-1)">‹</button>
      <span id="today-date"></span>
      <button onclick="shiftDay(1)">›</button>
    </div>
  </div>
  <div class="card" id="summary-card"></div>
  <div id="slots"></div>
  <div class="card" id="water-card"></div>
  <div style="display:flex;gap:8px">
    <button class="btn full" onclick="importHealth()">⬇︎ Import from Health</button>
    <button class="btn full" onclick="syncHealth()">⬆︎ Export to Health</button>
  </div>
</div>

<!-- ============ TRENDS ============ -->
<div class="page" id="page-trends">
  <div class="topbar"><h1>Trends</h1>
    <button class="btn small" onclick="openModal('weight-modal')">+ Log weight</button></div>
  <div class="card" id="goal-card"></div>
  <h3 style="margin:14px 0 6px;font-size:14px">Weight vs target path</h3>
  <canvas id="weight-chart" height="220"></canvas>
  <div class="legend"><span><i style="background:var(--accent)"></i>Actual</span>
    <span><i style="background:var(--dim)"></i>Target path</span></div>
  <h3 style="margin:14px 0 6px;font-size:14px">Calories — last 14 days</h3>
  <canvas id="kcal-chart" height="180"></canvas>
  <div class="legend"><span><i style="background:var(--good)"></i>On target</span>
    <span><i style="background:var(--ok)"></i>Under</span>
    <span><i style="background:var(--bad)"></i>Over</span></div>
  <h3 style="margin:14px 0 6px;font-size:14px">Protein — last 14 days</h3>
  <canvas id="protein-chart" height="180"></canvas>
</div>

<!-- ============ FOODS / PLAN ============ -->
<div class="page" id="page-foods">
  <div class="topbar"><h1>Foods & Plan</h1></div>
  <div class="pill-row">
    <button class="pill active" id="tab-plan" onclick="foodsTab('plan')">Meal plan</button>
    <button class="pill" id="tab-db" onclick="foodsTab('db')">Food database</button>
  </div>
  <div id="plan-editor"></div>
  <div id="db-editor" style="display:none">
    <input id="db-search" placeholder="Search foods…" oninput="renderDB()" style="margin-bottom:10px">
    <button class="btn full" style="margin-bottom:10px" onclick="editFood(null)">+ Add custom food</button>
    <div id="db-list"></div>
  </div>
</div>

<!-- ============ CHAT ============ -->
<div class="page" id="page-chat">
  <div class="topbar"><h1>Coach</h1>
    <button class="btn small" onclick="clearChat()">Clear</button></div>
  <div id="chat-setup" class="card" style="display:none">
    <p class="muted">Paste your Anthropic API key to enable the coach. It's stored only on this device.</p>
    <label>API key</label><input id="api-key-input" placeholder="sk-ant-…">
    <button class="btn primary full" style="margin-top:12px" onclick="saveApiKey()">Save</button>
  </div>
  <div id="chatlog"></div>
  <div class="chat-input">
    <textarea id="chat-text" placeholder="Ask about meals, macros, swaps…"></textarea>
    <button class="btn primary" onclick="sendChat()">➤</button>
  </div>
</div>

<!-- ============ PROFILE ============ -->
<div class="page" id="page-profile">
  <div class="topbar"><h1>Profile</h1></div>
  <div id="profile-form"></div>
</div>

<!-- ============ MODALS ============ -->
<div class="modal-bg" id="food-modal"><div class="modal">
  <h3 id="food-modal-title">Add food</h3>
  <input id="food-search" placeholder="Search…" oninput="renderFoodPicker()">
  <div class="food-list" id="food-picker"></div>
  <div id="qty-section" style="display:none">
    <label id="qty-label">Quantity</label>
    <input id="qty-input" type="number" inputmode="decimal">
    <div id="qty-preview" class="muted" style="margin-top:8px"></div>
    <button class="btn primary full" style="margin-top:12px" onclick="confirmAddFood()">Add</button>
  </div>
  <button class="btn full" style="margin-top:10px" onclick="closeModal('food-modal')">Cancel</button>
</div></div>

<div class="modal-bg" id="weight-modal"><div class="modal">
  <h3>Log weight</h3>
  <label>Weight (kg)</label>
  <input id="weight-input" type="number" inputmode="decimal" step="0.1">
  <button class="btn primary full" style="margin-top:14px" onclick="saveWeight()">Save</button>
  <button class="btn full" style="margin-top:8px" onclick="closeModal('weight-modal')">Cancel</button>
</div></div>

<div class="modal-bg" id="editfood-modal"><div class="modal">
  <h3 id="editfood-title">Edit food</h3>
  <div id="editfood-form"></div>
</div></div>

<!-- ============ NAV ============ -->
<div class="nav">
  <button id="nav-today" class="active" onclick="go('today')"><span class="ico">☀️</span>Today</button>
  <button id="nav-trends" onclick="go('trends')"><span class="ico">📈</span>Trends</button>
  <button id="nav-foods" onclick="go('foods')"><span class="ico">🍛</span>Foods</button>
  <button id="nav-chat" onclick="go('chat')"><span class="ico">💬</span>Coach</button>
  <button id="nav-profile" onclick="go('profile')"><span class="ico">👤</span>Profile</button>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
